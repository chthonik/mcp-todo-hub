<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCP Todo Hub — Shared Task Manager</title>
  <meta name="description"
    content="A shared todo list for AI agents and humans. Manage tasks through the web or MCP protocol.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <g transform="translate(12, 12)">
              <polygon points="0,-9 7.794,-4.5 7.794,4.5 0,9 -7.794,4.5 -7.794,-4.5" fill="none" stroke="currentColor" />
              <line x1="0" y1="-9" x2="0" y2="-4.5" />
              <line x1="7.794" y1="-4.5" x2="3.897" y2="-2.25" />
              <line x1="7.794" y1="4.5" x2="3.897" y2="2.25" />
              <line x1="0" y1="9" x2="0" y2="4.5" />
              <line x1="-7.794" y1="4.5" x2="-3.897" y2="2.25" />
              <line x1="-7.794" y1="-4.5" x2="-3.897" y2="-2.25" />
              <polygon points="1.75,-3.031 3.5,0 1.75,3.031 -1.75,3.031 -3.5,0 -1.75,-3.031" fill="currentColor" stroke="none" />
              <circle cx="0" cy="-9" r="1.5" fill="currentColor" stroke="none" />
              <circle cx="7.794" cy="-4.5" r="1.5" fill="currentColor" stroke="none" />
              <circle cx="7.794" cy="4.5" r="1.5" fill="currentColor" stroke="none" />
              <circle cx="0" cy="9" r="1.5" fill="currentColor" stroke="none" />
              <circle cx="-7.794" cy="4.5" r="1.5" fill="currentColor" stroke="none" />
              <circle cx="-7.794" cy="-4.5" r="1.5" fill="currentColor" stroke="none" />
            </g>
          </svg>
          <h1>Todo Hub</h1>
        </div>
        <span class="mcp-badge">MCP Enabled</span>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-view="all" id="nav-all">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
            <path d="M8 14h.01"></path>
            <path d="M12 14h.01"></path>
            <path d="M16 14h.01"></path>
            <path d="M8 18h.01"></path>
            <path d="M12 18h.01"></path>
            <path d="M16 18h.01"></path>
          </svg>
          <span class="nav-label">All Tasks</span>
          <span class="nav-count" id="count-all">0</span>
        </button>
        <button class="nav-item" data-view="pending" id="nav-pending">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
          </svg>
          <span class="nav-label">Pending</span>
          <span class="nav-count" id="count-pending">0</span>
        </button>
        <button class="nav-item" data-view="in_progress" id="nav-in_progress">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12c0-5.523 4.477-10 10-10 5.522 0 10 4.477 10 10 0 5.522-4.478 10-10 10V22M12 2v6h-6"></path>
          </svg>
          <span class="nav-label">In Progress</span>
          <span class="nav-count" id="count-progress">0</span>
        </button>
        <button class="nav-item" data-view="done" id="nav-done">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
          </svg>
          <span class="nav-label">Done</span>
          <span class="nav-count" id="count-done">0</span>
        </button>
        <button class="nav-item" data-view="urgent" id="nav-urgent">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          <span class="nav-label">Urgent</span>
          <span class="nav-count" id="count-urgent">0</span>
        </button>
      </nav>

      <div class="sidebar-section">
        <h3>Categories</h3>
        <div id="category-list" class="category-list"></div>
        <button class="add-category-btn" id="add-category-btn">+ Add Category</button>
      </div>

      <div class="sidebar-footer">
        <div class="sidebar-section">
          <h3>Activity Feed</h3>
          <div id="activity-feed" class="activity-feed"></div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <!-- Top Bar -->
      <header class="topbar">
        <button class="menu-toggle" id="menu-toggle">☰</button>
        <div class="search-bar">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="search-input" placeholder="Search tasks..." autocomplete="off">
        </div>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
          <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" style="display: none;">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
        <div class="topbar-stats" id="topbar-stats"></div>
      </header>

      <!-- Stats Cards -->
      <section class="stats-row" id="stats-row">
        <div class="stat-card stat-total">
          <div class="stat-value" id="stat-total">0</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat-card stat-pending">
          <div class="stat-value" id="stat-pending">0</div>
          <div class="stat-label">Pending</div>
        </div>
        <div class="stat-card stat-progress">
          <div class="stat-value" id="stat-inprogress">0</div>
          <div class="stat-label">In Progress</div>
        </div>
        <div class="stat-card stat-done">
          <div class="stat-value" id="stat-done">0</div>
          <div class="stat-label">Done</div>
        </div>
        <div class="stat-card stat-overdue">
          <div class="stat-value" id="stat-overdue">0</div>
          <div class="stat-label">Overdue</div>
        </div>
      </section>

      <!-- Add Task Bar -->
      <section class="add-task-section">
        <form id="add-task-form" class="add-task-form">
          <div class="add-task-main">
            <input type="text" id="task-title" placeholder="What needs to be done?" required autocomplete="off">
            <button type="submit" class="add-btn" id="add-task-btn">Add Task</button>
          </div>
          <div class="add-task-extras" id="add-task-extras">
            <input type="text" id="task-description" placeholder="Description (optional)" autocomplete="off">
            <select id="task-priority">
              <option value="medium">Medium</option>
              <option value="low">Low</option>
              <option value="high">High</option>
              <option value="urgent">Urgent</option>
            </select>
            <select id="task-category"></select>
            <input type="text" id="task-assignee" placeholder="Assignee" autocomplete="off">
            <input type="date" id="task-due-date">
          </div>
        </form>
      </section>

      <!-- Task List -->
      <section class="task-list-section">
        <div class="task-list-header">
          <h2 id="view-title">All Tasks</h2>
          <div class="task-list-actions">
            <select id="sort-select">
              <option value="priority">Sort by Priority</option>
              <option value="date">Sort by Date</option>
              <option value="due">Sort by Due Date</option>
            </select>
          </div>
        </div>
        <div class="task-list" id="task-list">
          <div class="empty-state" id="empty-state">
            <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="9" y1="9" x2="15" y2="9"></line>
              <line x1="9" y1="13" x2="15" y2="13"></line>
              <line x1="9" y1="17" x2="12" y2="17"></line>
            </svg>
            <h3>No tasks yet</h3>
            <p>Add your first task above to get started!</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Edit Task</h2>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <form id="edit-form" class="edit-form">
        <input type="hidden" id="edit-id">
        <label>Title</label>
        <input type="text" id="edit-title" required>
        <label>Description</label>
        <textarea id="edit-description" rows="3"></textarea>
        <div class="edit-row">
          <div>
            <label>Status</label>
            <select id="edit-status">
              <option value="pending">Pending</option>
              <option value="in_progress">In Progress</option>
              <option value="done">Done</option>
            </select>
          </div>
          <div>
            <label>Priority</label>
            <select id="edit-priority">
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
              <option value="urgent">Urgent</option>
            </select>
          </div>
        </div>
        <div class="edit-row">
          <div>
            <label>Category</label>
            <select id="edit-category"></select>
          </div>
          <div>
            <label>Assignee</label>
            <input type="text" id="edit-assignee">
          </div>
        </div>
        <label>Due Date</label>
        <input type="date" id="edit-due-date">
        <div class="modal-actions">
          <button type="button" class="btn-delete" id="edit-delete-btn">Delete</button>
          <button type="submit" class="btn-save">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
